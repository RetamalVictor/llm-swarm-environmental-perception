config:
  name: "example1" # Run label used in output folder names and experiment tracking.

simulation:
  run_length: 10 # Number of capture epochs per run (used for progression length on plots).
  headless: true # True = run without a visible UI window (robot crops are still captured and sent to the LLM).
  save_photo_frames: false # Save one full-scene PNG per capture epoch when True (requires an available pygame display surface).
  save_robot_crops: false # Save each robot's cropped camera image per capture epoch under run_output/robot_crops/ (works in headless and non-headless modes).
  width: 2500 # Simulation world width in pixels.
  height: 2500 # Simulation world height in pixels.
  fps: 60 # Ticks per real second in headed and headless modes (set 0 for uncapped headless speed).
  num_of_robots: 10 # Number of robots spawned in the environment.
  background_image: "background-2500.png" # Background image file under src/assets.
  robot_image: "robot.png" # Robot sprite image file under src/assets.
  seed: 0 # Random seed for reproducible robot placement/motion.

robot:
  linear_speed: 2.3 # Forward movement speed per simulation tick.
  angular_velocity: 5 # Turn velocity used for edge-avoidance corrections.
  coverage_side: 200 # Side length of the robot camera capture square.
  neighbor_radius: 200 # Proximity radius used to detect neighboring robots.
  capture_frequency: 20 # Sim-seconds of movement between capture rounds when fps > 0; PHOTO_TICKS = capture_frequency * fps.
  wait_for_photo_llm: true # false = async: keep moving on capture schedule, drop stalled photo LLM calls after photo_timeout_ticks. true = epoch sync: freeze the sim after each capture batch until all photo LLM responses return (then start the next capture_frequency window).
  communication: true # Enables/disables peer-to-peer message exchange entirely.
  self_learning: true # True = photo prompt includes existing memory, False = image-only summary.
  max_facts_per_observation: 40 # Hard cap for stored merged fact sentences.
  photo_timeout_ticks: 600 # Drop stalled photo API request after this many ticks (~seconds * fps).
  inbox_timeout_ticks: 300 # Release stalled inbox synthesis request after this many ticks (~seconds * fps).
  max_inbox_merges_per_epoch: 1 # Per-robot merge budget each capture epoch (set 1/2/3/4+ as needed).
  inbox_merge_after_budget: "drop" # Behavior once budget is reached: "drop", "deterministic", or "llm".
  use_llm_inbox_synthesis: true # True = LLM inbox synthesis, False = deterministic merge_observations.
  save_comm_merge_history: false # Save only successful peer merges to run_output/communication_merges.jsonl.
  empty_observation: "first run. no observations so far" # Initial placeholder memory before first photo result.

llm:
  provider: "ollama" # Backend: gemini, openai, or ollama.
  model_name: "qwen3.5:4b" # Model name passed to the selected provider.
  thread_workers: 10 # Worker threads handling queued API requests.
  temperature: 0.05 # Sampling temperature for generation.
  max_output_tokens: 220 # Max tokens returned per LLM call.
  base_url: http://localhost:11434 # Optional. Ollama default: http://localhost:11434. OpenAI-compatible proxy URL if set.
  api_key_env: "GOOGLE_API_KEY" # Env var for API key (OPENAI_API_KEY for openai; unused for ollama).
  prompts:
    photo_analysis_self_learning: |
      You are a robotic perception module. Your goal is to maintain a 'Factual Log' of entities you observe.

      [My Factual Log So Far]
      {observation}

      [New Visual Input]
      The attached image is your new visual data.

      ---
      YOUR TASK:
      Update the [My Factual Log So Far] with new objects found in the [New Visual Input].

      **STRICT WRITING RULES:**
      - **Syntax Constraint:** EVERY sentence must follow this exact structure: "[Entity] is present." or "[Entity] has [Attribute]."
      - **Example:** "A coffee mug is present. A stapler is present. A laptop is present. The stapler has blue plastic."
      - **Grammar Ban:** You are STRICTLY FORBIDDEN from using conjunctions (and, but, or), commas, or complex sentences. 
      - **No Redundancy:** Do not add entities that are already listed in the Factual Log.
      - **Entity Focus:** Ignore generic background textures (floor, walls, ceiling) unless they are unique landmarks. Focus on distinct objects.
      - **Length Cap:** The final output must be at most 12 sentences.
      - **Format:** Output a single paragraph composed entirely of these short, independent sentences.

      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED PARAGRAPH. Do not include any preamble.
    
    photo_analysis_no_self_learning: | #'|' removes the memory log so far component since only used in self learning
      You are a robotic perception module for a member of a collaborative swarm. Your function is to provide a dense, factual, and geometric summary of your surroundings by integrating new visual data.

      [New Visual Input] The attached image is your new visual data.

      YOUR TASK: Analyze the [New Visual Input] for factual objects, attributes (color, shape), and spatial/geometric relationships. Create a cohesive summary of the environment.

      RULES:

      Be Geometric & Spatial: Describe the layout and relationships (e.g., "A blue moat surrounds a central red structure," "A dirt path extends from the SSW.").

      Be Factual & Objective: Identify primary objects (castle, tree, path), their key attributes (color, shape), and quantity if clear.

      Be Literal: Describe only what is visible. Do not infer purpose or use subjective language ("nice," "beautiful").

      Format: The final summary must not exceed 400 tokens.

      Output Constraint: YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED SUMMARY. Do not include any preamble, conversational text, or headings.


    text_synthesis: |
      You are a data fusion module for a robot swarm. Your task is to merge two "Factual Logs" into one master log.

      [My Factual Log]
      {current_observation}

      [Peer's Factual Log]
      {inbox}

      ---
      YOUR TASK:
      Combine both logs into a single paragraph of unique facts.

      **STRICT WRITING RULES:**
      - **De-duplication (CRITICAL):** Scan both logs for the same entity. If an entity is mentioned in both logs, KEEP ONLY ONE SENTENCE about it. Delete the duplicate entirely.
      - **Syntax Constraint:** Maintain the strict structure: "[Entity] is present." or "[Entity] has [Attribute]."
      - **Grammar Ban:** Do not combine sentences. Do not use the word "and". Keep every fact as a separate sentence.
      - **Length Cap:** The final output must be at most 12 sentences.
      - **Length Control:** If the combined list exceeds 400 tokens, you must drop the most common entities (e.g., standard floor tiles, generic chairs) and prioritize keeping unique landmarks (Coffee Machine, Whiteboard, Projector).

      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL SYNTHESIZED PARAGRAPH. Do not add any preamble.