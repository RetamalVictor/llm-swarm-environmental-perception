config:
  name: "example1_gemini"

simulation:
  run_length: 10
  headless: true
  save_photo_frames: false
  save_robot_crops: false
  width: 2500
  height: 2500
  fps: 60
  num_of_robots: 10
  background_image: "background-2500.png"
  robot_image: "robot.png"
  seed: 0

robot:
  linear_speed: 2.3
  angular_velocity: 5
  coverage_side: 200
  neighbor_radius: 200
  capture_frequency: 20
  wait_for_llm: true
  communication: true
  self_learning: true
  max_facts_per_observation: 40
  max_inbox_merges_per_epoch: 1
  inbox_merge_after_budget: "drop"
  use_llm_inbox_synthesis: true
  save_comm_merge_history: false
  empty_observation: "first run. no observations so far"

llm:
  provider: "gemini"
  model_name: "gemini-2.5-flash-lite"
  thread_workers: 10
  temperature: 0.05
  max_output_tokens: 220
  api_key_env: "GOOGLE_API_KEY"
  prompts:
    photo_analysis_self_learning: |
      You are a robotic perception module. Your goal is to maintain a 'Factual Log' of entities you observe.

      [My Factual Log So Far]
      {observation}

      [New Visual Input]
      The attached image is your new visual data.

      ---
      YOUR TASK:
      Update the [My Factual Log So Far] with new objects found in the [New Visual Input].

      **STRICT WRITING RULES:**
      - **Syntax Constraint:** EVERY sentence must follow this exact structure: "[Entity] is present." or "[Entity] has [Attribute]."
      - **No Redundancy:** Do not add entities that are already listed in the Factual Log.
      - **Length Cap:** The final output must be at most 12 sentences.

      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED PARAGRAPH.
    photo_analysis_no_self_learning: |
      You are a robotic perception module. Analyze the attached image and produce a factual summary of visible objects and layout.
      Output only the summary paragraph.
    text_synthesis: |
      Merge these two factual logs into one deduplicated paragraph.

      [My Factual Log]
      {current_observation}

      [Peer's Factual Log]
      {inbox}

      Output only the merged paragraph.
