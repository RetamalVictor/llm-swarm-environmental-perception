config:
  name: bg2500_small_comm

simulation:
  run_length: 25 # iterations/observations Ts
  headless: False # show simulation UI or not
  save_photo_frames: true # save full simulation frame on each photo capture to run_output/frames/
  save_robot_crops: false # save each robot cropped camera capture per epoch to run_output/robot_crops/
  width: 2500
  height: 2500
  fps: 60
  num_of_robots: 9
  background_image: "background-2500.png" # /assets 1200 x 1200
  robot_image: "robot.png" # /assets
  seed: 0

robot:
  linear_speed: 2.3
  angular_velocity: 5
  coverage_side: 150
  neighbor_radius: 150 # half the coverage side
  capture_frequency: 5 # in seconds, *FPS
  communication: True
  self_learning: True # replace current_observation or merge it
  max_facts_per_observation: 40
  photo_timeout_ticks: 600
  inbox_timeout_ticks: 300
  empty_observation: "first run. no observations so far"
  use_llm_inbox_synthesis: True
  save_comm_merge_history: True # save only successful communication merges to communication_merges.jsonl
  max_inbox_merges_per_epoch: 1
  inbox_merge_after_budget: "drop"

llm:
  model_name: 'gemini-2.5-flash-lite'
  thread_workers: 9
  temperature: 0.05
  max_output_tokens: 220
  prompts:
    photo_analysis_self_learning: |
      You are a robotic perception module. Your goal is to maintain a 'Factual Log' of entities you observe.

      [My Factual Log So Far]
      {observation}

      [New Visual Input]
      The attached image is your new visual data.

      ---
      YOUR TASK:
      Update the [My Factual Log So Far] with new objects found in the [New Visual Input].

      **STRICT WRITING RULES:**
      - **Syntax Constraint:** EVERY sentence must follow this exact structure: "[Entity] is present." or "[Entity] has [Attribute]."
      - **Example:** "A coffee mug is present. A stapler is present. A laptop is present. The stapler has blue plastic."
      - **Grammar Ban:** You are STRICTLY FORBIDDEN from using conjunctions (and, but, or), commas, or complex sentences. 
      - **No Redundancy:** Do not add entities that are already listed in the Factual Log.
      - **Entity Focus:** Ignore generic background textures (floor, walls, ceiling) unless they are unique landmarks. Focus on distinct objects.
      - **Length Cap:** The final output must be at most 12 sentences.
      - **Format:** Output a single paragraph composed entirely of these short, independent sentences.

      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED PARAGRAPH. Do not include any preamble.
    
    photo_analysis_no_self_learning: | #'|' removes the memory log so far component since only used in self learning
      You are a robotic perception module for a member of a collaborative swarm. Your function is to provide a dense, factual, and geometric summary of your surroundings by integrating new visual data.

      [New Visual Input] The attached image is your new visual data.

      YOUR TASK: Analyze the [New Visual Input] for factual objects, attributes (color, shape), and spatial/geometric relationships. Create a cohesive summary of the environment.

      RULES:

      Be Geometric & Spatial: Describe the layout and relationships (e.g., "A blue moat surrounds a central red structure," "A dirt path extends from the SSW.").

      Be Factual & Objective: Identify primary objects (castle, tree, path), their key attributes (color, shape), and quantity if clear.

      Be Literal: Describe only what is visible. Do not infer purpose or use subjective language ("nice," "beautiful").

      Format: The final summary must not exceed 400 tokens.

      Output Constraint: YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED SUMMARY. Do not include any preamble, conversational text, or headings.


    text_synthesis: |
      You are a data fusion module for a robot swarm. Your task is to merge two "Factual Logs" into one master log.

      [My Factual Log]
      {current_observation}

      [Peer's Factual Log]
      {inbox}

      ---
      YOUR TASK:
      Combine both logs into a single paragraph of unique facts.

      **STRICT WRITING RULES:**
      - **De-duplication (CRITICAL):** Scan both logs for the same entity. If an entity is mentioned in both logs, KEEP ONLY ONE SENTENCE about it. Delete the duplicate entirely.
      - **Syntax Constraint:** Maintain the strict structure: "[Entity] is present." or "[Entity] has [Attribute]."
      - **Grammar Ban:** Do not combine sentences. Do not use the word "and". Keep every fact as a separate sentence.
      - **Length Cap:** The final output must be at most 12 sentences.
      - **Length Control:** If the combined list exceeds 400 tokens, you must drop the most common entities (e.g., standard floor tiles, generic chairs) and prioritize keeping unique landmarks (Coffee Machine, Whiteboard, Projector).

      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL SYNTHESIZED PARAGRAPH. Do not add any preamble.