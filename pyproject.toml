[project]
name = "swarm-perception"
version = "0.1.0"
description = "Research-grade swarm environmental-perception benchmark"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.2",
    "opencv-python>=4.12",
    "pygame>=2.6",
    "violet>=0.0.2",
    "violet-simulator>=0.2.4",
    "PyYAML>=6.0",
    "python-dotenv>=1.1",
]

[project.optional-dependencies]
# Legacy LLM perception path (provider SDKs). Deleted in M3.
llm = [
    "google-generativeai>=0.8",
    "openai>=2.6",
    "httpx>=0.28",
    "requests>=2.32",
    "pillow>=11.3",
]
# Evaluation / metrics stack.
eval = [
    "torch>=2.8",
    "transformers>=4.57",
    "sentence-transformers>=5.1",
    "bert-score>=0.3.13",
    "scikit-learn>=1.7",
    "nltk>=3.9",
    "pandas>=3.0",
    "matplotlib>=3.10",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
    "mypy>=1.11",
]

[project.scripts]
swarm-run = "swarm_perception.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/swarm_perception"]
