site_name: Swarm Conversational Agents
site_description: Documentation for the capstone swarm perception framework
site_url: https://retamalvictor.github.io/llm-swarm-environmental-perception/
repo_url: https://github.com/RetamalVictor/llm-swarm-environmental-perception
repo_name: RetamalVictor/llm-swarm-environmental-perception
edit_uri: https://github.com/RetamalVictor/llm-swarm-environmental-perception/edit/main/docs/
theme:
  name: material
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
            - experiments
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Methodology: methodology.md
  - Running Experiments: experiments.md
  - API Reference:
      - Runtime (src): reference/src.md
      - Experiments: reference/experiments.md
