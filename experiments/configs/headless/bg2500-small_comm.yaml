config:
  name: bg2500_small_comm

simulation:
  run_length: 30 # iterations/observations Ts
  headless: True # run without a visible UI window when True (robot crops are still captured)
  save_photo_frames: false # save full simulation frame on each photo capture to run_output/frames/ (requires display surface)
  save_robot_crops: false # save each robot cropped camera capture per epoch to run_output/robot_crops/ (works in headless/non-headless)
  width: 2500
  height: 2500
  fps: 60
  num_of_robots: 9
  background_image: "background-2500.png" # /assets 1200 x 1200
  robot_image: "robot.png" # /assets
  seed: 0

robot:
  linear_speed: 2.3
  angular_velocity: 5
  coverage_side: 150
  neighbor_radius: 150 # half the coverage side
  capture_frequency: 5 # in seconds, *FPS
  communication: True
  self_learning: True
  memory_cap: 40
  max_inbox_merges_per_epoch: 1
  inbox_merge_after_budget: "drop"
