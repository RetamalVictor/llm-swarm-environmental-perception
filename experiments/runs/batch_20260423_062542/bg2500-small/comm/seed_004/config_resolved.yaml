config:
  name: bg2500_small_comm_seed004
simulation:
  run_length: 30
  headless: false
  save_photo_frames: false
  save_robot_crops: false
  width: 2500
  height: 2500
  fps: 60
  num_of_robots: 9
  background_image: background-2500.png
  robot_image: robot.png
  seed: 4
  output_dir: /Users/absera/Capstone/swarm-robotics/experiments/runs/batch_20260423_062542/bg2500-small/comm/seed_004
robot:
  linear_speed: 2.3
  angular_velocity: 5
  coverage_side: 150
  neighbor_radius: 150
  capture_frequency: 5
  communication: true
  self_learning: true
  max_facts_per_observation: 40
  photo_timeout_ticks: 600
  inbox_timeout_ticks: 300
  empty_observation: first run. no observations so far
  use_llm_inbox_synthesis: true
  save_comm_merge_history: true
  max_inbox_merges_per_epoch: 1
  inbox_merge_after_budget: drop
llm:
  model_name: gemini-2.5-flash-lite
  thread_workers: 9
  temperature: 0.05
  max_output_tokens: 220
  prompts:
    photo_analysis_self_learning: "You are a robotic perception module. Your goal\
      \ is to maintain a 'Factual Log' of entities you observe.\n\n[My Factual Log\
      \ So Far]\n{observation}\n\n[New Visual Input]\nThe attached image is your new\
      \ visual data.\n\n---\nYOUR TASK:\nUpdate the [My Factual Log So Far] with new\
      \ objects found in the [New Visual Input].\n\n**STRICT WRITING RULES:**\n- **Syntax\
      \ Constraint:** EVERY sentence must follow this exact structure: \"[Entity]\
      \ is present.\" or \"[Entity] has [Attribute].\"\n- **Example:** \"A coffee\
      \ mug is present. A stapler is present. A laptop is present. The stapler has\
      \ blue plastic.\"\n- **Grammar Ban:** You are STRICTLY FORBIDDEN from using\
      \ conjunctions (and, but, or), commas, or complex sentences. \n- **No Redundancy:**\
      \ Do not add entities that are already listed in the Factual Log.\n- **Entity\
      \ Focus:** Ignore generic background textures (floor, walls, ceiling) unless\
      \ they are unique landmarks. Focus on distinct objects.\n- **Length Cap:** The\
      \ final output must be at most 12 sentences.\n- **Format:** Output a single\
      \ paragraph composed entirely of these short, independent sentences.\n\n**Output\
      \ Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED PARAGRAPH.\
      \ Do not include any preamble.\n"
    photo_analysis_no_self_learning: 'You are a robotic perception module for a member
      of a collaborative swarm. Your function is to provide a dense, factual, and
      geometric summary of your surroundings by integrating new visual data.


      [New Visual Input] The attached image is your new visual data.


      YOUR TASK: Analyze the [New Visual Input] for factual objects, attributes (color,
      shape), and spatial/geometric relationships. Create a cohesive summary of the
      environment.


      RULES:


      Be Geometric & Spatial: Describe the layout and relationships (e.g., "A blue
      moat surrounds a central red structure," "A dirt path extends from the SSW.").


      Be Factual & Objective: Identify primary objects (castle, tree, path), their
      key attributes (color, shape), and quantity if clear.


      Be Literal: Describe only what is visible. Do not infer purpose or use subjective
      language ("nice," "beautiful").


      Format: The final summary must not exceed 400 tokens.


      Output Constraint: YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL REVISED SUMMARY.
      Do not include any preamble, conversational text, or headings.

      '
    text_synthesis: 'You are a data fusion module for a robot swarm. Your task is
      to merge two "Factual Logs" into one master log.


      [My Factual Log]

      {current_observation}


      [Peer''s Factual Log]

      {inbox}


      ---

      YOUR TASK:

      Combine both logs into a single paragraph of unique facts.


      **STRICT WRITING RULES:**

      - **De-duplication (CRITICAL):** Scan both logs for the same entity. If an entity
      is mentioned in both logs, KEEP ONLY ONE SENTENCE about it. Delete the duplicate
      entirely.

      - **Syntax Constraint:** Maintain the strict structure: "[Entity] is present."
      or "[Entity] has [Attribute]."

      - **Grammar Ban:** Do not combine sentences. Do not use the word "and". Keep
      every fact as a separate sentence.

      - **Length Cap:** The final output must be at most 12 sentences.

      - **Length Control:** If the combined list exceeds 400 tokens, you must drop
      the most common entities (e.g., standard floor tiles, generic chairs) and prioritize
      keeping unique landmarks (Coffee Machine, Whiteboard, Projector).


      **Output Constraint:** YOUR ENTIRE RESPONSE MUST BE ONLY THE FINAL SYNTHESIZED
      PARAGRAPH. Do not add any preamble.'
